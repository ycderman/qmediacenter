name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Syntax check: every push ───────────────────────────────────────────────
  syntax:
    name: Python syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check all .py files parse cleanly
        run: |
          python - <<'EOF'
          import ast, sys, pathlib
          skip = {"dist", "__pycache__", "build"}
          errors = []
          files = [f for f in pathlib.Path(".").rglob("*.py")
                   if not skip & set(f.parts)]
          for f in files:
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f"{f}:{e.lineno}: {e.msg}")
          if errors:
              print("\n".join(errors)); sys.exit(1)
          print(f"OK — {len(files)} files")
          EOF

  # ── Headless UI tests: every push ─────────────────────────────────────────
  test:
    name: Headless UI tests
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libmpv2 libgles2 libegl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libfreetype6 libgl1
      - name: Install Python dependencies
        run: pip install --quiet pyside6 mpv pyopengl requests
      - name: Run UI tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
          LC_NUMERIC: C
        run: python test_ui.py

  # ── PyInstaller bundle on Ubuntu 22.04 (standard glibc ELF) ───────────────
  bundle:
    name: PyInstaller bundle
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libmpv-dev
      - name: Install Python dependencies
        run: pip install --quiet pyside6 mpv pyopengl requests yt-dlp pyinstaller
      - name: Get version
        id: version
        run: |
          V=$(git describe --tags --abbrev=0 2>/dev/null | tr -d 'v' || echo "0.3.0")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V"
      - name: Build with PyInstaller
        run: pyinstaller qmediacenter.spec --clean --noconfirm
      - name: Verify ELF interpreter is standard (not Nix)
        run: |
          INTERP=$(readelf -l dist/qmediacenter/qmediacenter | grep interpreter | grep -oP '(?<=\[).*(?=\])' || true)
          echo "ELF interpreter: $INTERP"
          if echo "$INTERP" | grep -q "/nix/store"; then
            echo "ERROR: Binary has Nix store interpreter — will not run on other distros"; exit 1
          fi
      - name: Write version file into bundle
        run: echo "${{ steps.version.outputs.version }}" > dist/qmediacenter/.version
      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: dist/qmediacenter/
          retention-days: 1

  # ── Build .deb on Ubuntu 22.04 ────────────────────────────────────────────
  build-deb:
    name: Build .deb
    runs-on: ubuntu-22.04
    needs: bundle
    steps:
      - uses: actions/checkout@v4
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle
          path: dist/qmediacenter/
      - name: Install fpm
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ruby ruby-dev build-essential
          sudo gem install fpm --no-document
      - name: Build .deb
        run: |
          VERSION=$(cat dist/qmediacenter/.version || echo "0.3.0")
          echo "Version: $VERSION"
          fpm -s dir -t deb \
            -n qmediacenter -v "$VERSION" -a x86_64 \
            --description "Qt6/mpv media center — IPTV, Emby, Plex + local/network library" \
            --url "https://github.com/ycderman/qmediacenter" \
            --license MIT \
            --depends "libmpv1 | libmpv2" \
            --category video \
            --deb-no-default-config-files \
            --after-install packaging/postinst \
            --after-remove  packaging/postrm \
            --package dist/ \
            "dist/qmediacenter/=/opt/qmediacenter/" \
            "packaging/qmediacenter.desktop=/usr/share/applications/io.github.ycderman.qmediacenter.desktop" \
            "data/qmediacenter.png=/usr/share/pixmaps/qmediacenter.png"
          ls -lh dist/*.deb
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: dist/*.deb
          retention-days: 7

  # ── Build .rpm on Fedora 41 (rpmbuild native) ─────────────────────────────
  build-rpm:
    name: Build .rpm
    runs-on: ubuntu-latest
    needs: bundle
    container: fedora:41
    steps:
      - uses: actions/checkout@v4
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle
          path: dist/qmediacenter/
      - name: Install fpm
        run: |
          dnf install -y ruby ruby-devel gcc make rpm-build redhat-rpm-config
          gem install fpm --no-document
      - name: Debug rpmbuild
        run: rpmbuild --version && rpmbuild --showrc | grep -E "^macro|buildroot" | head -5 || true
      - name: Build .rpm
        run: |
          VERSION=$(cat dist/qmediacenter/.version || echo "0.3.0")
          echo "Version: $VERSION"
          fpm -s dir -t rpm \
            -n qmediacenter -v "$VERSION" -a x86_64 \
            --description "Qt6/mpv media center — IPTV, Emby, Plex + local/network library" \
            --url "https://github.com/ycderman/qmediacenter" \
            --license MIT \
            --depends mpv-libs \
            --category "Applications/Multimedia" \
            --after-install packaging/postinst \
            --after-remove  packaging/postrm \
            --package dist/ \
            "dist/qmediacenter/=/opt/qmediacenter/" \
            "packaging/qmediacenter.desktop=/usr/share/applications/io.github.ycderman.qmediacenter.desktop" \
            "data/qmediacenter.png=/usr/share/pixmaps/qmediacenter.png"
          ls -lh dist/*.rpm
      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: dist/*.rpm
          retention-days: 7

  # ── Smoke test: install .deb on Ubuntu 24.04 ──────────────────────────────
  smoke-deb:
    name: Install .deb — Ubuntu 24.04
    runs-on: ubuntu-24.04
    needs: build-deb
    steps:
      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: dist/
      - name: Install libmpv
        run: sudo apt-get update -q && sudo apt-get install -y libmpv2
      - name: Install .deb
        run: sudo dpkg -i dist/*.deb
      - name: Verify binary
        run: |
          echo "=== installed files ===" && dpkg -L qmediacenter | head -30
          echo "=== /opt contents ===" && ls -la /opt/ || true
          echo "=== /opt/qmediacenter ===" && ls -la /opt/qmediacenter/ || true
          test -x /opt/qmediacenter/qmediacenter && echo "Binary OK"
      - name: Smoke test — must not crash (SIGABRT/SIGSEGV)
        run: |
          QT_QPA_PLATFORM=offscreen timeout 5 /opt/qmediacenter/qmediacenter || EXIT=$?
          echo "Exit code: ${EXIT:-0}"
          if [ "${EXIT:-0}" -eq 134 ] || [ "${EXIT:-0}" -eq 139 ]; then
            echo "FAIL: process crashed (signal $((${EXIT:-0} - 128)))"; exit 1
          fi
          echo "PASS"

  # ── Smoke test: install .rpm on Fedora 41 ─────────────────────────────────
  smoke-rpm:
    name: Install .rpm — Fedora 41
    runs-on: ubuntu-latest
    needs: build-rpm
    container: fedora:41
    steps:
      - name: Download .rpm
        uses: actions/download-artifact@v4
        with:
          name: rpm-package
          path: dist/
      - name: Install mpv-libs
        run: dnf install -y mpv-libs
      - name: Install .rpm
        run: dnf install -y dist/*.rpm
      - name: Verify binary
        run: |
          echo "=== installed files ===" && rpm -ql qmediacenter | head -30
          echo "=== /opt/qmediacenter ===" && ls -la /opt/qmediacenter/ || true
          test -x /opt/qmediacenter/qmediacenter && echo "Binary OK"
      - name: Smoke test — must not crash (SIGABRT/SIGSEGV)
        run: |
          QT_QPA_PLATFORM=offscreen timeout 5 /opt/qmediacenter/qmediacenter || EXIT=$?
          echo "Exit code: ${EXIT:-0}"
          if [ "${EXIT:-0}" -eq 134 ] || [ "${EXIT:-0}" -eq 139 ]; then
            echo "FAIL: process crashed (signal $((${EXIT:-0} - 128)))"; exit 1
          fi
          echo "PASS"
