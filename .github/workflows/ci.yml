name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Syntax check: every push ───────────────────────────────────────────────
  syntax:
    name: Python syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check all .py files parse cleanly
        run: |
          python - <<'EOF'
          import ast, sys, pathlib
          skip = {"dist", "__pycache__", "build"}
          errors = []
          files = [f for f in pathlib.Path(".").rglob("*.py")
                   if not skip & set(f.parts)]
          for f in files:
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f"{f}:{e.lineno}: {e.msg}")
          if errors:
              print("\n".join(errors)); sys.exit(1)
          print(f"OK — {len(files)} files")
          EOF

  # ── Headless UI tests: every push ─────────────────────────────────────────
  test:
    name: Headless UI tests
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libmpv2 libgles2 libegl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libfreetype6 libgl1
      - name: Install Python dependencies
        run: pip install --quiet pyside6 mpv pyopengl requests
      - name: Run UI tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
          LC_NUMERIC: C
        run: python test_ui.py

  # ── Build packages on standard Ubuntu (glibc compatible ELF) ──────────────
  build:
    name: Build .deb and .rpm
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libmpv-dev \
            ruby ruby-dev build-essential rpm
          sudo gem install fpm --no-document
      - name: Install Python dependencies
        run: pip install --quiet pyside6 mpv pyopengl requests yt-dlp pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller qmediacenter.spec --clean --noconfirm
      - name: Build .deb package
        run: |
          VERSION=$(python - <<'EOF'
          import importlib.util, sys
          # read version from git tag or fallback
          import subprocess
          try:
              tag = subprocess.check_output(
                  ["git", "describe", "--tags", "--abbrev=0"], text=True).strip().lstrip("v")
          except Exception:
              tag = "0.3.0"
          print(tag)
          EOF
          )
          echo "Building v$VERSION"
          fpm -s dir -t deb \
            -n qmediacenter \
            -v "$VERSION" \
            -a x86_64 \
            --description "Qt6/mpv media center — IPTV, Emby, Plex + local/network library" \
            --url "https://github.com/ycderman/qmediacenter" \
            --license MIT \
            --depends "libmpv1 | libmpv2" \
            --category "video" \
            --deb-no-default-config-files \
            --after-install packaging/postinst \
            --after-remove packaging/postrm \
            --package dist/ \
            "dist/qmediacenter/=/opt/qmediacenter/" \
            "packaging/qmediacenter.desktop=/usr/share/applications/io.github.ycderman.qmediacenter.desktop" \
            "data/qmediacenter.png=/usr/share/pixmaps/qmediacenter.png"
      - name: Build .rpm package
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | tr -d 'v' || echo "0.3.0")
          fpm -s dir -t rpm \
            -n qmediacenter \
            -v "$VERSION" \
            -a x86_64 \
            --description "Qt6/mpv media center — IPTV, Emby, Plex + local/network library" \
            --url "https://github.com/ycderman/qmediacenter" \
            --license MIT \
            --depends "mpv-libs" \
            --category "Applications/Multimedia" \
            --after-install packaging/postinst \
            --after-remove packaging/postrm \
            --package dist/ \
            "dist/qmediacenter/=/opt/qmediacenter/" \
            "packaging/qmediacenter.desktop=/usr/share/applications/io.github.ycderman.qmediacenter.desktop" \
            "data/qmediacenter.png=/usr/share/pixmaps/qmediacenter.png"
      - name: List built packages
        run: ls -lh dist/*.deb dist/*.rpm
      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            dist/*.deb
            dist/*.rpm
          retention-days: 7

  # ── Smoke test: install .deb on Ubuntu 24.04 ──────────────────────────────
  smoke-deb:
    name: Install .deb — Ubuntu 24.04
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist/
      - name: Install libmpv
        run: sudo apt-get update -q && sudo apt-get install -y libmpv2
      - name: Install .deb
        run: sudo dpkg -i dist/*.deb
      - name: Verify binary exists and is executable
        run: test -x /opt/qmediacenter/qmediacenter && echo "Binary OK"
      - name: Verify desktop file installed
        run: test -f /usr/share/applications/io.github.ycderman.qmediacenter.desktop && echo "Desktop OK"
      - name: Verify symlink
        run: test -L /usr/local/bin/qmediacenter && echo "Symlink OK"
      - name: Smoke test — must not crash (SIGABRT/SIGSEGV)
        run: |
          QT_QPA_PLATFORM=offscreen timeout 5 /opt/qmediacenter/qmediacenter || EXIT=$?
          echo "Exit code: ${EXIT:-0}"
          if [ "${EXIT:-0}" -eq 134 ] || [ "${EXIT:-0}" -eq 139 ]; then
            echo "FAIL: process crashed"; exit 1
          fi
          echo "PASS"

  # ── Smoke test: install .rpm on Fedora 41 ─────────────────────────────────
  smoke-rpm:
    name: Install .rpm — Fedora 41
    runs-on: ubuntu-latest
    needs: build
    container: fedora:41
    steps:
      - name: Install container tools
        run: dnf install -y findutils
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist/
      - name: Install mpv-libs
        run: dnf install -y mpv-libs
      - name: Install .rpm
        run: dnf install -y dist/*.rpm
      - name: Verify binary exists and is executable
        run: test -x /opt/qmediacenter/qmediacenter && echo "Binary OK"
      - name: Smoke test — must not crash (SIGABRT/SIGSEGV)
        run: |
          QT_QPA_PLATFORM=offscreen timeout 5 /opt/qmediacenter/qmediacenter || EXIT=$?
          echo "Exit code: ${EXIT:-0}"
          if [ "${EXIT:-0}" -eq 134 ] || [ "${EXIT:-0}" -eq 139 ]; then
            echo "FAIL: process crashed"; exit 1
          fi
          echo "PASS"
